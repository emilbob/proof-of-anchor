name: keep-green

# Monthly health check: does this project still build and pass its tests?
# A failed scheduled run emails the repo owner — silent rot becomes a signal.
on:
  schedule:
    - cron: "0 6 3 * *"
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Noir toolchain (verifier's zkTLS tests execute nargo)
        run: |
          curl -sL https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          "$HOME/.nargo/bin/noirup" -v v1.0.0-beta.22   # pinned: 'latest' can resolve to a release with no binary assets
          echo "$HOME/.nargo/bin" >> "$GITHUB_PATH"
      - name: Build & test (auto-detected toolchain)
        run: |
          set -e
          ran=0
          if [ -f package.json ]; then
            ran=1
            PM=npm
            if [ -f pnpm-lock.yaml ]; then
              PM=pnpm; command -v pnpm >/dev/null || npm i -g pnpm
              pnpm install --frozen-lockfile
            elif [ -f yarn.lock ]; then
              PM=yarn; command -v yarn >/dev/null || npm i -g yarn
              yarn install --frozen-lockfile
            elif [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            if node -e "process.exit((require('./package.json').scripts||{}).build?0:1)"; then $PM run build; fi
            if node -e "process.exit((require('./package.json').scripts||{}).test?0:1)"; then $PM run test; fi
          fi
          ct=$(find . -name Cargo.toml -not -path '*/target/*' -not -path '*/node_modules/*' | head -1)
          if [ -n "$ct" ]; then
            ran=1
            cd "$(dirname "$ct")"
            cargo build
            cargo test
            cd - >/dev/null
          fi
          if [ "$ran" = 0 ]; then echo "No recognized toolchain — nothing to check."; fi
